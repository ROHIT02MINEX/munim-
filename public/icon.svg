<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>
    
    <!-- Accent Emerald Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <!-- Indigo Gradient -->
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Card Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Outer Subtle Ring -->
  <rect x="12" y="12" width="488" height="488" rx="100" fill="none" stroke="url(#emeraldGrad)" stroke-width="2" stroke-opacity="0.15" />

  <!-- Background Decorative Grid Lines -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="2">
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
  </g>

  <!-- Glowing Trend/Growth Line (Behind the M) -->
  <path d="M 96 384 Q 180 320 256 220 T 416 128" fill="none" stroke="url(#indigoGrad)" stroke-width="16" stroke-linecap="round" opacity="0.3" filter="url(#glow)" />
  <path d="M 96 384 Q 180 320 256 220 T 416 128" fill="none" stroke="url(#emeraldGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />

  <!-- Stylized "M" Symbol -->
  <g filter="url(#glow)">
    <!-- Left Pillar -->
    <path d="M 144 384 L 144 160 C 144 140 160 128 176 140 L 256 210 L 336 140 C 352 128 368 140 368 160 L 368 384" 
          fill="none" stroke="url(#emeraldGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Inner Detailing Line -->
    <path d="M 144 320 L 144 180 L 256 270 L 368 180 L 368 320" 
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
  </g>

  <!-- Little Sparkle/Growth Arrow at the End of Trend -->
  <circle cx="416" cy="128" r="14" fill="#34D399" filter="url(#glow)" />
  <circle cx="416" cy="128" r="6" fill="#ffffff" />
</svg>
